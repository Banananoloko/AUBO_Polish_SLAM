# joint_limits.yaml — AUBO E5 calibrated to ~24% of hardware limits.
# Hardware max (from aubo_driver.cpp MaxVelc/MaxAcc):
#   Joints 1-3:  2.596 rad/s,  17.309 rad/s^2
#   Joints 4-6:  3.110 rad/s,  20.737 rad/s^2
#
# These are the SINGLE source of safety truth — applied to ALL paths
# (both square_demo TUI and RViz Plan & Execute).
#
# Effective velocity at robot:
#   RViz path:       limits_vel × 1.0(no MoveIt scaling) × 0.5(velocity_scale_factor) × 2.5(timing) = 24% HW
#   Square demo:     limits_vel × 1.0(VELOCITY_SCALING=1.0) × 0.5 × 2.5 = 24% HW
#   = 0.5 × 0.5 × 2.5 = 0.625 rad/s (24% HW, joints 1-3)
#   = 0.6 × 0.5 × 2.5 = 0.750 rad/s (24% HW, joints 4-6)
joint_limits:
  shoulder_joint:
    has_velocity_limits: true
    max_velocity: 0.5
    has_acceleration_limits: true
    max_acceleration: 3.5
  upperArm_joint:
    has_velocity_limits: true
    max_velocity: 0.5
    has_acceleration_limits: true
    max_acceleration: 3.5
  foreArm_joint:
    has_velocity_limits: true
    max_velocity: 0.5
    has_acceleration_limits: true
    max_acceleration: 3.5
  wrist1_joint:
    has_velocity_limits: true
    max_velocity: 0.6
    has_acceleration_limits: true
    max_acceleration: 4.0
  wrist2_joint:
    has_velocity_limits: true
    max_velocity: 0.6
    has_acceleration_limits: true
    max_acceleration: 4.0
  wrist3_joint:
    has_velocity_limits: true
    max_velocity: 0.6
    has_acceleration_limits: true
    max_acceleration: 4.0
