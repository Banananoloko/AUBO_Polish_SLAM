aubo_e5:
  # publish all joint states--------------
  joint_state_controller:
    type: joint_state_controller/JointStateController
    publish_rate: 50

  # Position Controllers (单关节，供aubo_gazebo_driver使用)
  shoulder_joint_position_controller:
    type: position_controllers/JointPositionController
    joint: shoulder_joint
    pid: {p: 800.0, i: 0.02, d: 5.0, i_clamp: 0.5}

  upperArm_joint_position_controller:
    type: position_controllers/JointPositionController
    joint: upperArm_joint
    pid: {p: 750.0, i: 0.02, d: 5.0, i_clamp: 0.5}

  foreArm_joint_position_controller:
    type: position_controllers/JointPositionController
    joint: foreArm_joint
    pid: {p: 500.0, i: 0.02, d: 4.0, i_clamp: 0.5}

  wrist1_joint_position_controller:
    type: position_controllers/JointPositionController
    joint: wrist1_joint
    pid: {p: 80.0, i: 0.002, d: 2.5, i_clamp: 0.5}

  wrist2_joint_position_controller:
    type: position_controllers/JointPositionController
    joint: wrist2_joint
    pid: {p: 80.0, i: 0.002, d: 2.5, i_clamp: 0.5}

  wrist3_joint_position_controller:
    type: position_controllers/JointPositionController
    joint: wrist3_joint
    pid: {p: 40.0, i: 0.002, d: 1.5, i_clamp: 0.3}

  gazebo_ros_control:
    pid_gains:
      shoulder_joint:  {p: 800.0, i: 0.02, d: 5.0, i_clamp: 0.5}
      upperArm_joint:  {p: 750.0, i: 0.02, d: 5.0, i_clamp: 0.5}
      foreArm_joint:   {p: 500.0, i: 0.02, d: 4.0, i_clamp: 0.5}
      wrist1_joint:    {p: 80.0,  i: 0.002, d: 2.5, i_clamp: 0.5}
      wrist2_joint:    {p: 80.0,  i: 0.002, d: 2.5, i_clamp: 0.5}
      wrist3_joint:    {p: 40.0,  i: 0.002, d: 1.5, i_clamp: 0.3}

