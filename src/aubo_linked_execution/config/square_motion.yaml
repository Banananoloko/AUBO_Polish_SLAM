name: "Square Motion"
description: "Draw a 20cm x 20cm square in base frame"
mode: cartesian

cartesian_waypoints:
  # 起点（正方形左下角）
  - position: {x: 0.4, y: -0.1, z: 0.4}
    orientation: {x: 0.0, y: 0.707, z: 0.0, w: 0.707}

  # 右下角
  - position: {x: 0.4, y: 0.1, z: 0.4}
    orientation: {x: 0.0, y: 0.707, z: 0.0, w: 0.707}

  # 右上角
  - position: {x: 0.4, y: 0.1, z: 0.6}
    orientation: {x: 0.0, y: 0.707, z: 0.0, w: 0.707}

  # 左上角
  - position: {x: 0.4, y: -0.1, z: 0.6}
    orientation: {x: 0.0, y: 0.707, z: 0.0, w: 0.707}

  # 回到起点（闭合）
  - position: {x: 0.4, y: -0.1, z: 0.4}
    orientation: {x: 0.0, y: 0.707, z: 0.0, w: 0.707}
