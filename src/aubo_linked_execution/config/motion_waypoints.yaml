# 连续运动路径点配置文件

# 关节空间路径点（单位：弧度）
# 每个路径点包含 6 个关节角度值
joint_waypoints:
  - [0.0, -0.5, 0.5, 0.0, 0.5, 0.0]
  - [0.5, -0.5, 0.5, 0.0, 0.5, 0.0]
  - [0.5, -0.3, 0.3, 0.0, 0.3, 0.0]
  - [0.0, -0.3, 0.3, 0.0, 0.3, 0.0]

# 笛卡尔空间路径点（单位：米）
# 每个路径点包含位置 (x, y, z) 和姿态 (x, y, z, w)
cartesian_waypoints:
  - position: {x: 0.3, y: 0.2, z: 0.4}
    orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  - position: {x: 0.3, y: -0.2, z: 0.4}
    orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  - position: {x: 0.5, y: 0.0, z: 0.3}
    orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}
  - position: {x: 0.4, y: 0.1, z: 0.35}
    orientation: {x: 0.0, y: 0.0, z: 0.0, w: 1.0}

# 预定义目标序列
# 使用 MoveIt 配置中定义的命名位置
named_targets:
  - "home"
  - "ready"
  - "home"
