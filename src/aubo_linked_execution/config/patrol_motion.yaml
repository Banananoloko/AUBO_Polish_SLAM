name: "Patrol Motion"
description: "Visit multiple predefined positions"
mode: cartesian

cartesian_waypoints:
  # 位置 1
  - position: {x: 0.3, y: 0.2, z: 0.5}
    orientation: {x: 0.0, y: 0.707, z: 0.0, w: 0.707}

  # 位置 2
  - position: {x: 0.5, y: 0.2, z: 0.4}
    orientation: {x: 0.0, y: 0.707, z: 0.0, w: 0.707}

  # 位置 3
  - position: {x: 0.5, y: -0.2, z: 0.4}
    orientation: {x: 0.0, y: 0.707, z: 0.0, w: 0.707}

  # 位置 4
  - position: {x: 0.3, y: -0.2, z: 0.5}
    orientation: {x: 0.0, y: 0.707, z: 0.0, w: 0.707}

  # 回到起点
  - position: {x: 0.3, y: 0.2, z: 0.5}
    orientation: {x: 0.0, y: 0.707, z: 0.0, w: 0.707}
